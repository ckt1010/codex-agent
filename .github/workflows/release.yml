name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install build

      - name: Quality checks
        run: |
          ruff check .
          mypy src
          pytest --cov=src --cov-fail-under=80

      - name: Build artifacts
        run: |
          python -m build
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Generate changelog excerpt
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:'- %s' ${PREV_TAG}..HEAD)
          else
            LOG=$(git log --pretty=format:'- %s' -n 20)
          fi
          {
            echo 'body<<EOF'
            echo '## Changes'
            echo "$LOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/*
